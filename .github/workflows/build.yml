name: build

# Build LLM Wiki bundles for all three desktop platforms and publish them as
# assets on a draft GitHub Release.
#
# Triggers:
#   * push to `main`          — every merge produces a fresh draft release
#   * workflow_dispatch       — manual run from the Actions tab
#
# Pipeline:
#   1. `test`  — runs Rust + script + frontend tests with coverage,
#                uploads coverage HTML reports as artifacts.
#   2. `build` — only runs if `test` succeeds; produces installers on the
#                three desktop platforms and attaches them to a draft Release.
#
# Matrix (build stage):
#   ubuntu-latest   → .deb + .AppImage
#   windows-latest  → .exe (NSIS installer)
#   macos-latest    → .dmg

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required so tauri-action can create/update a release

jobs:
  # ── Test stage ──────────────────────────────────────────────────────────────
  # Runs once on Linux (cheapest leg) and gates the matrix build.  Coverage
  # reports are uploaded as artifacts so they can be downloaded from the
  # Actions summary page even when the run produced no release.
  test:
    name: test (lint + unit + coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wiki/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: wiki/src-tauri -> target
          shared-key: ubuntu-latest-test

      # Tauri 2's Linux build still needs the webkit/gtk dev libs even for
      # `cargo test`, because the bin target links against them.
      - name: Install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            file

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Install npm dependencies
        working-directory: wiki
        run: npm ci

      # ── Unit / integration tests ────────────────────────────────────────
      - name: Run all tests
        working-directory: wiki
        run: npm run test:all

      # ── Coverage runs ───────────────────────────────────────────────────
      # These re-run the same suites with instrumentation; failures still
      # propagate so a coverage crash also fails the job.
      - name: Frontend coverage (vitest + v8)
        working-directory: wiki
        run: npm run test:coverage:frontend

      - name: Rust coverage (cargo-tarpaulin)
        working-directory: wiki
        run: npm run test:coverage:rust

      # ── Aggregated summary + 70% gate ───────────────────────────────────
      - name: Test summary + coverage gate
        working-directory: wiki
        run: npm run test:summary

      # ── Artifacts ───────────────────────────────────────────────────────
      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: wiki/coverage/frontend
          if-no-files-found: warn

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: wiki/coverage/rust
          if-no-files-found: warn

  # ── Build stage ─────────────────────────────────────────────────────────────
  # Only runs if `test` passed.
  build:
    name: ${{ matrix.platform }} (${{ matrix.bundles }})
    runs-on: ${{ matrix.platform }}
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            bundles: deb,appimage
          - platform: windows-latest
            bundles: nsis
          - platform: macos-latest
            bundles: dmg

    steps:
      # ── Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchains ──────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wiki/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: wiki/src-tauri -> target
          # Cache key is keyed off OS + tauri.conf.json + lockfile;
          # bumping it here also invalidates if package-lock changes.
          shared-key: ${{ matrix.platform }}-${{ matrix.bundles }}

      # ── Platform-specific system dependencies ───────────────────────────
      # Tauri 2 on Linux requires the webkit2gtk-4.1 toolchain plus the AT-SPI
      # accessibility libs that the WebKit/GTK stack pulls in transitively.
      # Windows + macOS runners already ship every dependency we need.
      - name: Install Ubuntu system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            file

      # ── Frontend ────────────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: wiki
        run: npm ci

      # Static export goes to `wiki/out/`, which `tauri.conf.json`
      # references via `build.frontendDist`.  The `prenext:build` hook
      # regenerates `backlinks.json` + `search-index.json` first.
      - name: Build Next.js static export
        working-directory: wiki
        run: npm run next:build

      # ── Tauri bundle + GitHub Release ───────────────────────────────────
      # `tauri-apps/tauri-action` invokes `tauri build`, picks up the bundles
      # produced under `src-tauri/target/release/bundle/`, and uploads them as
      # assets to the release identified by `tagName`.  All three matrix legs
      # share the same tag so the draft accumulates installers.
      - name: Build + upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: wiki
          tagName: app-v__VERSION__
          releaseName: 'LLM Wiki v__VERSION__'
          releaseBody: |
            Automated build from `${{ github.sha }}`.

            Pick the installer for your platform:
            * **Linux** — `.deb` (Debian/Ubuntu) or `.AppImage` (portable)
            * **Windows** — `.exe` (NSIS installer)
            * **macOS** — `.dmg` (drag to Applications)

            See [README](https://github.com/${{ github.repository }}#installation) for setup.
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
